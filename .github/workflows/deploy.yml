name: Deploy Static Site to S3 + CloudFront

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  BUCKET_NAME: mickeyfan01-myweb-s3
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::450974104061:role/github-myweb-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 bucket
        run: |
          aws s3 mb s3://$BUCKET_NAME --region $AWS_REGION || echo "Bucket already exists"
          # Ensure ACLs are disabled so the Bucket Policy is the source of truth
          aws s3api put-public-access-block \
            --bucket $BUCKET_NAME \
            --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

      - name: Upload site to S3
        run: |
          aws s3 sync . s3://$BUCKET_NAME \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md"

      - name: Find or Create OAC
        id: oac
        run: |
          # Try to find existing OAC first
          OAC_ID=$(aws cloudfront list-origin-access-controls \
            --query "OriginAccessControlList.Items[?Name=='myweb-oac'].Id" \
            --output text)
          
          if [ -z "$OAC_ID" ] || [ "$OAC_ID" = "None" ]; then
            OAC_ID=$(aws cloudfront create-origin-access-control \
              --origin-access-control-config '{
                "Name": "myweb-oac",
                "Description": "OAC for private S3",
                "SigningProtocol": "sigv4",
                "SigningBehavior": "always",
                "OriginAccessControlOriginType": "s3"
              }' --query 'OriginAccessControl.Id' --output text)
          fi
          echo "OAC_ID=$OAC_ID" >> $GITHUB_ENV

      - name: Find or Create Distribution
        id: cf
        run: |
          # Search for distribution by the S3 bucket domain
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[0].DomainName=='${{ env.BUCKET_NAME }}.s3.${{ env.AWS_REGION }}.amazonaws.com'].Id" \
            --output text)

          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            cat > cf-config.json <<EOF
            {
              "CallerReference": "myweb-$(date +%s)",
              "Comment": "Static website with OAC",
              "Enabled": true,
              "DefaultRootObject": "index.html",
              "Origins": {
                "Quantity": 1,
                "Items": [
                  {
                    "Id": "S3Origin",
                    "DomainName": "${{ env.BUCKET_NAME }}.s3.${{ env.AWS_REGION }}.amazonaws.com",
                    "OriginAccessControlId": "${{ env.OAC_ID }}",
                    "S3OriginConfig": { "OriginAccessIdentity": "" }
                  }
                ]
              },
              "DefaultCacheBehavior": {
                "TargetOriginId": "S3Origin",
                "ViewerProtocolPolicy": "redirect-to-https",
                "AllowedMethods": { "Quantity": 2, "Items": ["GET","HEAD"] },
                "ForwardedValues": { "QueryString": false, "Cookies": { "Forward": "none" } }
              },
              "ViewerCertificate": { "CloudFrontDefaultCertificate": true }
            }
          EOF
            DIST_ID=$(aws cloudfront create-distribution \
              --distribution-config file://cf-config.json \
              --query 'Distribution.Id' --output text)
          fi
          echo "DIST_ID=$DIST_ID" >> $GITHUB_ENV

      - name: Update S3 bucket policy
        run: |
          aws s3api put-bucket-policy \
            --bucket ${{ env.BUCKET_NAME }} \
            --policy '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": { "Service": "cloudfront.amazonaws.com" },
                  "Action": "s3:GetObject",
                  "Resource": "arn:aws:s3:::${{ env.BUCKET_NAME }}/*",
                  "Condition": {
                    "StringEquals": {
                      "AWS:SourceArn": "arn:aws:cloudfront::450974104061:distribution/${{ env.DIST_ID }}"
                    }
                  }
                }
              ]
            }'

      - name: Invalidate Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.DIST_ID }} \
            --paths "/*"

      - name: Show Result
        run: |
          DOMAIN=$(aws cloudfront get-distribution --id ${{ env.DIST_ID }} --query 'Distribution.DomainName' --output text)
          echo "✅ Deployment complete!"
          echo "🌐 URL: https://$DOMAIN"
